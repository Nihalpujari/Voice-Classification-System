<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Speaker Recognition</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-image: url('static/images/bg1.jpg'); /* Updated path */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      background: rgba(0, 0, 0, 0.85);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      text-align: center;
      max-width: 450px;
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 10px;
      animation: slideDown 1s ease-in-out;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #fcdfff;
      animation: fadeIn 1.5s ease-in-out;
    }

    input[type="file"] {
      background: #fff;
      padding: 12px;
      border-radius: 10px;
      border: none;
      width: 100%;
      font-size: 16px;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-custom {
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      width: 100%;
      font-weight: 600;
    }

    .btn-custom:hover {
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      transform: scale(1.05);
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="container animate__animated animate__zoomIn">
    <h1 class="animate__animated animate__fadeInDown">🔊 Speaker Recognition</h1>
    <h2 class="animate__animated animate__fadeInUp">Upload an Audio File to Identify the Speaker</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="file" class="form-control" required><br>
      <button type="submit" class="btn btn-custom">🚀 Upload & Predict</button>
    </form>
  </div>
</body>
</html>
