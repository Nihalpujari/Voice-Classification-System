<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/party-js@latest/bundle/party.min.js"></script>
  <style>
    body {
    background-image: url('static/images/bg2.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
    overflow: hidden;
    text-align: center;
}

    .container {
      background: rgba(0, 0, 0, 0.85);
      padding: 50px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      width: 420px;
      animation: fadeIn 1.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .speaker-img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-bottom: 25px;
      animation: fadeIn 2s ease-in-out;
    }

    .info-line {
      font-size: 18px;
      margin-bottom: 12px;
      animation: fadeIn 1.8s ease-in-out;
    }

    .btn-custom {
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: white;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      width: 100%;
      font-weight: 600;
      animation: fadeIn 2.2s ease-in-out;
      text-decoration: none;
      display: inline-block;
    }

    .btn-custom:hover {
      background: linear-gradient(135deg, #ff7eb3, #ff758c);
      transform: scale(1.05);
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(() => {
        party.confetti(document.body, {
          count: 200,
          size: 1.5,
          spread: 90,
        });
      }, 500);

      setTimeout(() => {
        party.sparkles(document.body, {
          count: 100,
          size: 1.5,
          spread: 80,
        });
      }, 1500);
    });
  </script>
</head>
<body>
  <div class="container animate__animated animate__fadeInUp">
    <img src="{{ image_url }}" alt="Speaker Image" class="speaker-img">
    <p class="info-line"><strong>Predicted Speaker:</strong> {{ name }}</p>
    <p class="info-line"><strong>Age:</strong> {{ age }}</p>
    <p class="info-line"><strong>Phone:</strong> {{ phone }}</p>
    <p class="info-line"><strong>Experience:</strong> {{ experience }}</p>
    <p class="info-line"><strong>Email:</strong> {{ email }}</p>
    <a href="/" class="btn btn-custom mt-3">🔁 Go Back</a>
  </div>
</body>
</html>
